<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ultra Snake Professional | Premium Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #22c55e;
      --primary-glow: rgba(34, 197, 94, 0.5);
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --accent: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      padding: 10px;
    }

    /* Container & Layout */
    .game-container {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      z-index: 10;
      width: 100%;
      max-width: 500px;
    }

    .header {
      text-align: center;
      width: 100%;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #4ade80, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-item span {
      color: var(--primary);
      font-weight: 800;
    }

    /* Canvas Styling */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      max-width: 400px;
    }

    #game-canvas {
      width: 100%;
      height: 100%;
      background: #020617;
      border-radius: 12px;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 0 20px var(--primary-glow);
      border: 3px solid #1e293b;
      display: block;
    }

    /* Overlays */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 12px;
      transition: opacity 0.3s ease;
      text-align: center;
      padding: 20px;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .btn {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.4);
      font-family: 'Outfit', sans-serif;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    /* D-PAD Styling */
    .dpad {
      display: grid;
      grid-template-areas: 
        ". up ."
        "left center right"
        ". down .";
      gap: 10px;
      margin-top: 10px;
    }

    .dbtn {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .dbtn:active {
      background: var(--primary);
      transform: scale(0.95);
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .dbtn.up { grid-area: up; }
    .dbtn.down { grid-area: down; }
    .dbtn.left { grid-area: left; }
    .dbtn.right { grid-area: right; }
    .dbtn.center { 
      grid-area: center; 
      width: 60px; 
      height: 60px; 
      background: rgba(255,255,255,0.02); 
      border: none;
      cursor: default;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(34, 197, 94, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-hint {
      margin-top: 5px;
      color: #64748b;
      font-size: 0.75rem;
      text-align: center;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .game-container { padding: 1rem; }
      .dbtn { width: 55px; height: 55px; }
    }

    /* Sound Toggle */
    .sound-toggle {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 30;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <p>Menyiapkan Arena...</p>
  </div>

  <div class="game-container">
    <div class="header">
      <h1>SNAKE PRO MOBILE</h1>
      <div class="stats">
        <div class="stat-item">SKOR: <span id="score-val">0</span></div>
        <div class="stat-item">TERTINGGI: <span id="high-score-val">0</span></div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <div id="sound-btn" class="sound-toggle" onclick="toggleSound()">🔊</div>
      <canvas id="game-canvas" width="400" height="400"></canvas>
      
      <div id="start-overlay" class="overlay">
        <h2 style="margin-bottom: 1rem;">Siap Berburu?</h2>
        <button class="btn" onclick="startGame()">MULAI GAME</button>
        <p style="margin-top: 15px; font-size: 0.8rem; opacity: 0.6;">Gunakan tombol di bawah atau tombol panah</p>
      </div>

      <div id="gameover-overlay" class="overlay hidden">
        <h2 style="color: var(--danger); margin-bottom: 0.5rem;">GAME OVER</h2>
        <p style="margin-bottom: 1.5rem; opacity: 0.8;">Skor Kamu: <span id="final-score">0</span></p>
        <button class="btn" onclick="startGame()">COBA LAGI</button>
      </div>
    </div>

    <!-- Directional Buttons (D-PAD) -->
    <div class="dpad">
      <div class="dbtn up" onmousedown="handleInput('up')" ontouchstart="handleInput('up')">▲</div>
      <div class="dbtn left" onmousedown="handleInput('left')" ontouchstart="handleInput('left')">◀</div>
      <div class="dbtn center"></div>
      <div class="dbtn right" onmousedown="handleInput('right')" ontouchstart="handleInput('right')">▶</div>
      <div class="dbtn down" onmousedown="handleInput('down')" ontouchstart="handleInput('down')">▼</div>
    </div>

    <div class="footer-hint">
      Tips: Makan buah yang berganti-ganti untuk skor maksimal!
      <p>Copyright © 2026 ayudia putri rahayu.</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score-val');
    const highScoreElement = document.getElementById('high-score-val');
    const loadingScreen = document.getElementById('loading');
    const startOverlay = document.getElementById('start-overlay');
    const gameOverOverlay = document.getElementById('gameover-overlay');
    const soundBtn = document.getElementById('sound-btn');

    // Game Constants
    const GRID_SIZE = 20; // 400 / 20 = 20 tiles
    const TILE_COUNT = canvas.width / GRID_SIZE;
    const SNAKE_SPEED = 200; 

    // Assets
    const fruitImages = [];
    const fruitSources = [
      'img/apple.png', 'img/buah_naga.png', 'img/jeruk.png', 
      'img/melon.png', 'img/pepaya.png', 'img/semangka.png'
    ];

    let imagesLoaded = 0;
    fruitSources.forEach(src => {
      const img = new Image();
      img.src = src;
      img.onload = () => {
        imagesLoaded++;
        if (imagesLoaded === fruitSources.length) {
          setTimeout(() => {
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 500);
          }, 800);
        }
      };
      fruitImages.push(img);
    });

    // Sound System (Web Audio API)
    let audioCtx = null;
    let soundEnabled = true;

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundBtn.innerText = soundEnabled ? '🔊' : '🔈';
      initAudio();
    }

    function playSound(type) {
      if (!soundEnabled || !audioCtx) return;
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      if (type === 'eat') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'over') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      }
    }

    // Game State
    let snake = [];
    let food = { x: 5, y: 5, imgIndex: 0 };
    let dx = 0, dy = 0, nextDx = 0, nextDy = 0;
    let score = 0, highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameRunning = false, lastTime = 0, foodTimer = 0;

    highScoreElement.innerText = highScore;

    function initGame() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dx = 1; dy = 0; nextDx = 1; nextDy = 0;
      score = 0; scoreElement.innerText = score;
      spawnFood();
    }

    function spawnFood() {
      food.x = Math.floor(Math.random() * TILE_COUNT);
      food.y = Math.floor(Math.random() * TILE_COUNT);
      food.imgIndex = Math.floor(Math.random() * fruitImages.length);
      foodTimer = Date.now();
      snake.forEach(part => { if (part.x === food.x && part.y === food.y) spawnFood(); });
    }

    function startGame() {
      initAudio();
      initGame();
      gameRunning = true;
      startOverlay.classList.add('hidden');
      gameOverOverlay.classList.add('hidden');
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      gameRunning = false;
      playSound('over');
      document.getElementById('final-score').innerText = score;
      gameOverOverlay.classList.remove('hidden');
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreElement.innerText = highScore;
      }
    }

    // Input Handling
    function handleInput(dir) {
      initAudio(); // Resume context on user interaction
      switch(dir) {
        case 'up': if (dy !== 1) { nextDx = 0; nextDy = -1; } break;
        case 'down': if (dy !== -1) { nextDx = 0; nextDy = 1; } break;
        case 'left': if (dx !== 1) { nextDx = -1; nextDy = 0; } break;
        case 'right': if (dx !== -1) { nextDx = 1; nextDy = 0; } break;
      }
    }

    window.addEventListener('keydown', e => {
      if (e.key.includes('Arrow')) handleInput(e.key.replace('Arrow', '').toLowerCase());
    });

    function gameLoop(timestamp) {
      if (!gameRunning) return;
      if (timestamp - lastTime > SNAKE_SPEED) {
        lastTime = timestamp;
        update();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    function update() {
      dx = nextDx; dy = nextDy;
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) return gameOver();
      for (let part of snake) { if (part.x === head.x && part.y === head.y) return gameOver(); }
      
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.innerText = score;
        playSound('eat');
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
      for (let i = 0; i <= TILE_COUNT; i++) {
        ctx.beginPath(); ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * GRID_SIZE); ctx.lineTo(canvas.width, i * GRID_SIZE); ctx.stroke();
      }

      // Food
      const img = fruitImages[food.imgIndex];
      if (img) {
        // Sedikit lebih besar dari grid untuk efek visual yang bagus
        const padding = -2; 
        ctx.drawImage(img, food.x * GRID_SIZE + padding, food.y * GRID_SIZE + padding, GRID_SIZE - (padding * 2), GRID_SIZE - (padding * 2));
      }

      // Snake
      snake.forEach((part, i) => {
        const isHead = i === 0;
        ctx.save();
        ctx.translate(part.x * GRID_SIZE + GRID_SIZE / 2, part.y * GRID_SIZE + GRID_SIZE / 2);
        
        if (isHead) {
          let angle = dx === 1 ? 0 : dx === -1 ? Math.PI : dy === 1 ? Math.PI / 2 : -Math.PI / 2;
          ctx.rotate(angle);
          
          ctx.fillStyle = '#4ade80';
          ctx.beginPath(); ctx.ellipse(0, 0, GRID_SIZE/1.8, GRID_SIZE/2.2, 0, 0, Math.PI * 2); ctx.fill();
          
          ctx.fillStyle = 'white';
          ctx.beginPath(); ctx.arc(GRID_SIZE/4, -GRID_SIZE/5, 3, 0, Math.PI * 2); ctx.arc(GRID_SIZE/4, GRID_SIZE/5, 3, 0, Math.PI * 2); ctx.fill();
          
          ctx.fillStyle = 'black';
          ctx.beginPath(); ctx.arc(GRID_SIZE/3.5, -GRID_SIZE/5, 1.5, 0, Math.PI * 2); ctx.arc(GRID_SIZE/3.5, GRID_SIZE/5, 1.5, 0, Math.PI * 2); ctx.fill();
          
          ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(GRID_SIZE/2, 0); ctx.lineTo(GRID_SIZE/2 + 6, Math.sin(Date.now() / 100) * 3); ctx.stroke();
        } else {
          const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, GRID_SIZE/2);
          grad.addColorStop(0, '#22c55e'); grad.addColorStop(1, '#14532d');
          ctx.fillStyle = grad;
          ctx.beginPath(); 
          const sizeMult = 1 - (i / snake.length) * 0.3; // Tapering
          ctx.arc(0, 0, (GRID_SIZE/2.2) * sizeMult, 0, Math.PI * 2); 
          ctx.fill();
        }
        ctx.restore();
      });
    }
  </script>
</body>
</html>
