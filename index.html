<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ultra Snake Professional | Premium Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --primary-glow: rgba(34, 197, 94, 0.4);
      --bg: #0b1120;
      --card-bg: #1e293b;
      --card-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #22d3ee;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      padding: 10px;
    }

    /* Container & Layout */
    .game-container {
      position: relative;
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 2rem 1.5rem;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      z-index: 10;
      width: 100%;
      max-width: 440px;
    }

    .header {
      text-align: center;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px var(--primary-glow);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      width: 100%;
      font-size: 0.9rem;
      font-weight: 700;
      background: #0f172a;
      padding: 0.75rem 1.5rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 0.5rem;
    }

    .stat-item span {
      color: var(--primary);
      font-weight: 800;
    }

    /* Canvas Styling */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      max-width: 400px;
    }

    #game-canvas {
      width: 100%;
      height: 100%;
      background: #0b1120;
      border-radius: 20px;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
      border: 2px solid #22c55e;
      display: block;
    }

    /* Overlays */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 17, 32, 0.8);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 20px;
      transition: opacity 0.3s ease;
      text-align: center;
      padding: 2rem;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .btn {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      font-weight: 800;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.5);
      font-family: 'Outfit', sans-serif;
      letter-spacing: 0.02em;
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* D-PAD Styling */
    .dpad {
      display: grid;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
      gap: 12px;
      margin-top: 1rem;
    }

    .dbtn {
      width: 64px;
      height: 64px;
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    .dbtn svg {
      width: 24px;
      height: 24px;
      fill: white;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
    }

    .dbtn:active {
      background: #22c55e;
      transform: scale(0.92);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .dbtn.up {
      grid-area: up;
    }

    .dbtn.down {
      grid-area: down;
    }

    .dbtn.left {
      grid-area: left;
    }

    .dbtn.right {
      grid-area: right;
    }

    .dbtn.center {
      grid-area: center;
      width: 64px;
      height: 64px;
      background: transparent;
      border: none;
      box-shadow: none;
      cursor: default;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(34, 197, 94, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .footer-hint {
      margin-top: 10px;
      color: #4b5563;
      font-size: 0.85rem;
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      .game-container {
        padding: 1rem;
      }

      .dbtn {
        width: 55px;
        height: 55px;
      }
    }

    /* Sound Toggle */
    .sound-toggle {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease;
    }

    .sound-toggle:active {
      transform: scale(0.9);
    }

    .sound-toggle svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
  </style>
</head>

<body>

  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <p>Menyiapkan Arena...</p>
  </div>

  <div class="game-container">
    <div class="header">
      <h1>YU GAME-SNAKE</h1>
      <div class="stats">
        <div class="stat-item">SKOR: <span id="score-val" style="color: var(--primary);">0</span></div>
        <div class="stat-item">TERTINGGI: <span id="high-score-val" style="color: #22d3ee;">0</span></div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <div id="sound-btn" class="sound-toggle" onclick="toggleSound()">
        <svg id="sound-icon" viewBox="0 0 24 24">
          <path
            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
        </svg>
      </div>
      <canvas id="game-canvas" width="400" height="400"></canvas>

      <div id="start-overlay" class="overlay">
        <h2 style="margin-bottom: 1.5rem; font-size: 2rem; color: white;">Siap Berburu?</h2>
        <button class="btn" onclick="startGame()">MULAI GAME</button>
        <p style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">Gunakan tombol di bawah atau tombol
          panah</p>
      </div>

      <div id="gameover-overlay" class="overlay hidden">
        <h2 style="color: var(--danger); margin-bottom: 0.5rem;">GAME OVER</h2>
        <p style="margin-bottom: 1.5rem; opacity: 0.8;">Skor Kamu: <span id="final-score">0</span></p>
        <button class="btn" onclick="startGame()">COBA LAGI</button>
      </div>
    </div>

    <!-- Directional Buttons (D-PAD) -->
    <div class="dpad">
      <div class="dbtn up" onmousedown="handleInput('up')" ontouchstart="handleInput('up')">
        <svg viewBox="0 0 24 24">
          <path d="M12 8l-6 6h12l-6-6z" />
        </svg>
      </div>
      <div class="dbtn left" onmousedown="handleInput('left')" ontouchstart="handleInput('left')">
        <svg viewBox="0 0 24 24">
          <path d="M16 18l-6-6 6-6v12z" />
        </svg>
      </div>
      <div class="dbtn center"></div>
      <div class="dbtn right" onmousedown="handleInput('right')" ontouchstart="handleInput('right')">
        <svg viewBox="0 0 24 24">
          <path d="M8 6l6 6-6 6v-12z" />
        </svg>
      </div>
      <div class="dbtn down" onmousedown="handleInput('down')" ontouchstart="handleInput('down')">
        <svg viewBox="0 0 24 24">
          <path d="M12 16l6-6H6l6 6z" />
        </svg>
      </div>
    </div>

    <div class="footer-hint">
      Tips: Makan buah yang berganti-ganti untuk skor maksimal!
      <p style="opacity: 0.5; font-size: 0.7rem;color: green;">Copyright © 2026 ayudia putri rahayu.</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score-val');
    const highScoreElement = document.getElementById('high-score-val');
    const loadingScreen = document.getElementById('loading');
    const startOverlay = document.getElementById('start-overlay');
    const gameOverOverlay = document.getElementById('gameover-overlay');
    const soundBtn = document.getElementById('sound-btn');

    // Game Constants
    const GRID_SIZE = 20; // 400 / 20 = 20 tiles
    const TILE_COUNT = canvas.width / GRID_SIZE;
    const SNAKE_SPEED = 200;

    // Assets
    const fruitImages = [];
    const fruitSources = [
      'img/apple.png', 'img/buah_naga.png', 'img/jeruk.png',
      'img/melon.png', 'img/pepaya.png', 'img/semangka.png'
    ];

    let imagesLoaded = 0;
    fruitSources.forEach(src => {
      const img = new Image();
      img.src = src;
      img.onload = () => {
        imagesLoaded++;
        if (imagesLoaded === fruitSources.length) {
          setTimeout(() => {
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 500);
          }, 800);
        }
      };
      fruitImages.push(img);
    });

    // Sound System (Web Audio API)
    let audioCtx = null;
    let soundEnabled = true;

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      const icon = document.getElementById('sound-icon');
      if (soundEnabled) {
        icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
      } else {
        icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
      }
      initAudio();
    }

    function playSound(type) {
      if (!soundEnabled || !audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'eat') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'over') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      }
    }

    // Game State
    let snake = [];
    let food = { x: 5, y: 5, imgIndex: 0 };
    let dx = 0, dy = 0, nextDx = 0, nextDy = 0;
    let score = 0, highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameRunning = false, lastTime = 0, foodTimer = 0;

    highScoreElement.innerText = highScore;

    function initGame() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dx = 1; dy = 0; nextDx = 1; nextDy = 0;
      score = 0; scoreElement.innerText = score;
      spawnFood();
    }

    function spawnFood() {
      food.x = Math.floor(Math.random() * TILE_COUNT);
      food.y = Math.floor(Math.random() * TILE_COUNT);
      food.imgIndex = Math.floor(Math.random() * fruitImages.length);
      foodTimer = Date.now();
      snake.forEach(part => { if (part.x === food.x && part.y === food.y) spawnFood(); });
    }

    function startGame() {
      initAudio();
      initGame();
      gameRunning = true;
      startOverlay.classList.add('hidden');
      gameOverOverlay.classList.add('hidden');
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      gameRunning = false;
      playSound('over');
      document.getElementById('final-score').innerText = score;
      gameOverOverlay.classList.remove('hidden');
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreElement.innerText = highScore;
      }
    }

    // Input Handling
    function handleInput(dir) {
      initAudio(); // Resume context on user interaction
      switch (dir) {
        case 'up': if (dy !== 1) { nextDx = 0; nextDy = -1; } break;
        case 'down': if (dy !== -1) { nextDx = 0; nextDy = 1; } break;
        case 'left': if (dx !== 1) { nextDx = -1; nextDy = 0; } break;
        case 'right': if (dx !== -1) { nextDx = 1; nextDy = 0; } break;
      }
    }

    window.addEventListener('keydown', e => {
      if (e.key.includes('Arrow')) handleInput(e.key.replace('Arrow', '').toLowerCase());
    });

    function gameLoop(timestamp) {
      if (!gameRunning) return;
      if (timestamp - lastTime > SNAKE_SPEED) {
        lastTime = timestamp;
        update();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    function update() {
      dx = nextDx; dy = nextDy;
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) return gameOver();
      for (let part of snake) { if (part.x === head.x && part.y === head.y) return gameOver(); }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.innerText = score;
        playSound('eat');
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
      for (let i = 0; i <= TILE_COUNT; i++) {
        ctx.beginPath(); ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * GRID_SIZE); ctx.lineTo(canvas.width, i * GRID_SIZE); ctx.stroke();
      }

      // Food
      const img = fruitImages[food.imgIndex];
      if (img) {
        // Sedikit lebih besar dari grid untuk efek visual yang bagus
        const padding = -2;
        ctx.drawImage(img, food.x * GRID_SIZE + padding, food.y * GRID_SIZE + padding, GRID_SIZE - (padding * 2), GRID_SIZE - (padding * 2));
      }

      // Snake
      snake.forEach((part, i) => {
        const isHead = i === 0;
        ctx.save();
        ctx.translate(part.x * GRID_SIZE + GRID_SIZE / 2, part.y * GRID_SIZE + GRID_SIZE / 2);

        if (isHead) {
          let angle = dx === 1 ? 0 : dx === -1 ? Math.PI : dy === 1 ? Math.PI / 2 : -Math.PI / 2;
          ctx.rotate(angle);

          ctx.fillStyle = '#4ade80';
          ctx.beginPath(); ctx.ellipse(0, 0, GRID_SIZE / 1.8, GRID_SIZE / 2.2, 0, 0, Math.PI * 2); ctx.fill();

          ctx.fillStyle = 'white';
          ctx.beginPath(); ctx.arc(GRID_SIZE / 4, -GRID_SIZE / 5, 3, 0, Math.PI * 2); ctx.arc(GRID_SIZE / 4, GRID_SIZE / 5, 3, 0, Math.PI * 2); ctx.fill();

          ctx.fillStyle = 'black';
          ctx.beginPath(); ctx.arc(GRID_SIZE / 3.5, -GRID_SIZE / 5, 1.5, 0, Math.PI * 2); ctx.arc(GRID_SIZE / 3.5, GRID_SIZE / 5, 1.5, 0, Math.PI * 2); ctx.fill();

          ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(GRID_SIZE / 2, 0); ctx.lineTo(GRID_SIZE / 2 + 6, Math.sin(Date.now() / 100) * 3); ctx.stroke();
        } else {
          const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, GRID_SIZE / 2);
          grad.addColorStop(0, '#22c55e'); grad.addColorStop(1, '#14532d');
          ctx.fillStyle = grad;
          ctx.beginPath();
          const sizeMult = 1 - (i / snake.length) * 0.3; // Tapering
          ctx.arc(0, 0, (GRID_SIZE / 2.2) * sizeMult, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
    }
  </script>
</body>

</html>
